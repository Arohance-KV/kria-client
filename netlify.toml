# ── Build ────────────────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

# ── Redirects ─────────────────────────────────────────────────────────────────
# Netlify serves static files before redirect rules automatically.
# Only the SPA catch-all is needed here.

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
