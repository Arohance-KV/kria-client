# ── Build ────────────────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

# ── Redirects ─────────────────────────────────────────────────────────────────
# Static SEO files must be declared BEFORE the SPA catch-all so Googlebot
# and other crawlers always receive the real file, not index.html.

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = true

[[redirects]]
  from   = "/robots.txt"
  to     = "/robots.txt"
  status = 200
  force  = true

# SPA catch-all — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
# Ensure correct Content-Type so parsers (Google, Bing) accept the files.

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
