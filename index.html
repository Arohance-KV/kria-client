<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===================== Primary SEO ===================== -->
  <title>Kria Sports — Tournament Management & Auction Platform</title>
  <meta name="description" content="Kria Sports is a professional sports tournament management platform with live auction, team management, match brackets, and leaderboards. Built for badminton and beyond." />
  <meta name="keywords" content="sports tournament management, badminton tournament, player auction, team management, sports bracket, leaderboard, kria sports" />
  <meta name="author" content="Kria Sports" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://kria.club/" />

  <!-- ===================== Favicon & Icons ===================== -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
  <link rel="shortcut icon" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

  <!-- ===================== Theme ===================== -->
  <meta name="theme-color" content="#F97316" />
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="application-name" content="Kria Sports" />

  <!-- ===================== Open Graph (Facebook / LinkedIn / WhatsApp) ===================== -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Kria Sports" />
  <meta property="og:title" content="Kria Sports — Tournament Management & Auction Platform" />
  <meta property="og:description" content="Run professional sports tournaments with live auctions, team management, match brackets, and transparent leaderboards. Elevate your local league." />
  <meta property="og:url" content="https://kria.club/" />
  <meta property="og:image" content="https://kria.club/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Kria Sports — Tournament Management Platform" />
  <meta property="og:locale" content="en_IN" />

  <!-- ===================== Twitter Card ===================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Kria Sports — Tournament Management & Auction Platform" />
  <meta name="twitter:description" content="Run professional sports tournaments with live auctions, team management, match brackets, and transparent leaderboards." />
  <meta name="twitter:image" content="https://kria.club/og-image.png" />
  <meta name="twitter:image:alt" content="Kria Sports — Tournament Management Platform" />

  <!-- ===================== JSON-LD Structured Data ===================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://kria.club/#organization",
        "name": "Kria Sports",
        "url": "https://kria.club/",
        "logo": "https://kria.club/logo.png",
        "description": "Professional sports tournament management and auction platform for local leagues.",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "support@kriasports.com",
          "telephone": "+91-86373-73116",
          "contactType": "customer support",
          "areaServed": "IN"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mumbai",
          "addressCountry": "IN"
        },
        "sameAs": []
      },
      {
        "@type": "WebApplication",
        "@id": "https://kria.club/#webapp",
        "name": "Kria Sports",
        "url": "https://kria.club/",
        "description": "Tournament management platform with live auction, team management, match brackets, and leaderboards.",
        "applicationCategory": "SportsApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "publisher": {
          "@id": "https://kria.club/#organization"
        },
        "featureList": [
          "Tournament creation and management",
          "Live player auction system",
          "Team management and rosters",
          "Match bracket generation",
          "Real-time leaderboards",
          "Player registration"
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://kria.club/#website",
        "url": "https://kria.club/",
        "name": "Kria Sports",
        "publisher": {
          "@id": "https://kria.club/#organization"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://kria.club/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>

  <!-- ===================== Fonts ===================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
    rel="stylesheet"
  />

  <!-- Razorpay loaded dynamically at payment time -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
